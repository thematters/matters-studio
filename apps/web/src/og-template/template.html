<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="ds-template-size" content="1200x630" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/tokens.css" />
    <link rel="stylesheet" href="../shared/template-base.css" />
    <style>
      .tpl-canvas {
        width: 1200px;
        height: 630px;
        padding: 64px 72px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: linear-gradient(180deg, #ffffff 0%, var(--color-primary-0) 100%);
      }

      .tag-row {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        padding: 6px 16px;
        background: var(--color-brand-new-green);
        color: var(--color-grey-black);
        border-radius: 999px;
        font-size: 18px;
        font-weight: 500;
      }
      .topic {
        color: var(--color-grey-grey-darker);
        font-size: 18px;
      }

      .title {
        font-family: "Noto Serif TC", serif;
        font-size: 64px;
        line-height: 1.25;
        font-weight: 700;
        color: var(--color-grey-black);
        margin: 0;
        /* clamp at 3 lines */
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        max-width: 980px;
      }

      .summary {
        font-size: 22px;
        line-height: 1.6;
        color: var(--color-grey-grey-darker);
        margin: 24px 0 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        max-width: 980px;
      }

      .author-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .author {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        object-fit: cover;
        background: var(--color-primary-100);
      }
      .author-name {
        font-size: 22px;
        font-weight: 600;
        color: var(--color-grey-black);
      }
      .author-handle {
        font-size: 16px;
        color: var(--color-grey-grey-darker);
        margin-top: 2px;
      }
      .brand {
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="tpl-canvas">
      <header class="tag-row">
        <span class="tag">{{tag}}</span>
        <span class="topic">{{topic}}</span>
      </header>

      <main>
        <h1 class="title">{{title}}</h1>
        <p class="summary">{{summary}}</p>
      </main>

      <footer class="author-row">
        <div class="author">
          <img class="avatar" src="{{authorAvatarUrl}}" alt="" />
          <div>
            <div class="author-name">{{authorName}}</div>
            <div class="author-handle">@{{authorHandle}} · matters.town</div>
          </div>
        </div>
        <div class="tpl-brand-mark brand">
          <img class="tpl-brand-mark__icon" src="../shared/matters-mark-color.svg" alt="" />
          Matters
        </div>
      </footer>
    </div>
  </body>
</html>
